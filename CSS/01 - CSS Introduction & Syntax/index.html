<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSS Introduction & Syntax</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- Internal CSS -->
    <style>
      .internal-box {
        border: 2px solid blue;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <div class="external-box">External CSS box</div>

    <div class="internal-box">Internal CSS box</div>

    <!-- Inline CSS -->
    <div style="border: 2px solid red; padding: 10px">Inline CSS box</div>
  </body>
</html>
