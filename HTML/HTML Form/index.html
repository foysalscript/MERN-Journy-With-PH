<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Form</title>
  </head>
  <body>
    <h1 align="center">HTML Form Practics</h1>

    <form action="">
      <div>
        <label for="">Name :</label>
        <input type="text" required placeholder="Enter Your Full Name" />
      </div>
      <br />
      <div>
        <label for="">Email :</label>
        <input
          type="email"
          name=""
          id=""
          required
          placeholder="Enter Your Email"
        />
      </div>
      <br />
      <div>
        <label for="">Password :</label>
        <input type="password" name="" id="" required />
      </div>
      <br />
      <div>
        <label for="">Phone :</label>
        <input type="number" name="" id="" required />
      </div>
      <br />
      <div>
        <label for="">Gender :</label>
        <input type="radio" name="gender" id="" />Male
        <input type="radio" name="gender" id="" />Female
      </div>
      <br />
      <div>
        <label for="">Skill :</label>
        <input type="checkbox" name="" id="" />HTML
        <input type="checkbox" name="" id="" />CSS
        <input type="checkbox" name="" id="" />JS
        <input type="checkbox" name="" id="" />React JS
        <input type="checkbox" name="" id="" />Next JS
      </div>
      <br />
      <div>
        <label for="">continental :</label>
        <select name="" id="">
          <option value="Select">Select</option>
          <option value="Africa">Africa</option>
          <option value="Antarctica">Antarctica</option>
          <option value="Asia">Asia</option>
          <option value="Europe">Europe</option>
          <option value="North America">North America</option>
          <option value="South America">South America</option>
          <option value="Australia ">Australia</option>
        </select>
      </div>
      <br />
      <div>
        <label for="">Message :</label><br />
        <br />
        <textarea name="" id="" rows="5" cols="40"></textarea>
      </div>
      <br />
      <div>
        <label for="">Upload Your Photo :</label> <br />
        <br />
        <input type="file" name="" id="" />
      </div>
      <br />
      <div>
        <input type="reset" value="reset" />
        <input type="submit" value="submit" />
      </div>
    </form>
  </body>
</html>
